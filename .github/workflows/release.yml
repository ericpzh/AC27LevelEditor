name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0) — used for manual release'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npx vite build

      - name: Package Windows (portable)
        run: npx electron-builder --win portable --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Embed icon
        run: node set_icon.js release/AC27LevelEditor.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AC27-Level-Editor-Windows
          path: release/AC27LevelEditor.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (dmg)
        run: npm run build:mac -- --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AC27-Level-Editor-macOS
          path: release/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AC27-Level-Editor-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AC27-Level-Editor-macOS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
