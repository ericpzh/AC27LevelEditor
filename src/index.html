<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>AC27 Level Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-group">
      <button id="btn-open" title="打开 .acl 文件 (Ctrl+O)">📂 打开</button>
      <button id="btn-save" title="保存 (Ctrl+S)">💾 保存</button>
      <button id="btn-save-as" title="另存为...">📋 另存为</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="btn-import-csv" title="导入 CSV">📥 导入 CSV</button>
      <button id="btn-export-csv" title="导出 CSV">📤 导出 CSV</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="btn-add" title="添加航班 (Ctrl+N)">＋ 添加</button>
      <button id="btn-delete" title="删除选中 (Del)">✕ 删除</button>
      <button id="btn-duplicate" title="复制选中">⧉ 复制</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button id="btn-batch-callsign" title="批量生成呼号">🔢 呼号</button>
      <button id="btn-batch-voice" title="批量设置语音">🎤 语音</button>
      <button id="btn-batch-lang" title="批量设置语言">🌐 语言</button>
    </div>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-group">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜索任意字段...">
      </div>
      <select id="filter-type">
        <option value="all">全部</option>
        <option value="arrival">进港</option>
        <option value="departure">离港</option>
      </select>
    </div>
  </header>

  <!-- Table -->
  <main id="table-container">
    <table id="flight-table">
      <thead>
        <tr id="table-head"></tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="empty-state" class="hidden">
      <div class="empty-icon">📋</div>
      <h2>AC27 Level Editor</h2>
      <p>打开 .acl 文件开始编辑航班计划</p>
      <button class="btn-primary" onclick="document.getElementById('btn-open').click()">打开文件</button>
    </div>
  </main>

  <!-- Status Bar -->
  <footer id="statusbar">
    <span id="file-path">未打开文件</span>
    <span class="modified-indicator hidden" id="modified-dot">●</span>
    <span id="flight-stats"></span>
  </footer>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div id="modal-actions"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Context Menu -->
  <div id="context-menu"></div>

  <script src="renderer.js"></script>
</body>
</html>
