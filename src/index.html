<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>AC27 Level Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SCREEN 0: SETUP -->
  <div id="screen-setup" class="screen">
    <div class="setup-card">
      <h1 id="setup-title"></h1>
      <p id="setup-sub" class="setup-sub"></p>
      <button id="btn-lang-setup" class="btn-lang-toggle-top" onclick="alert('CLICKED');switchLang()">English</button>
      <div class="steam-hint">
        <div id="setup-steam-title" class="steam-hint-title"></div>
        <ol>
          <li id="setup-steam-step1"></li>
          <li id="setup-steam-step2"></li>
          <li id="setup-steam-step3"></li>
        </ol>
        <p class="steam-path-hint"><span id="setup-steam-path-label"></span><code id="setup-game-path"></code></p>
      </div>
      <div class="setup-nightly-note">
        <span class="setup-nightly-icon">⚠️</span>
        <span id="setup-nightly"></span>
      </div>
      <button id="btn-select-root" class="btn-big"></button>
      <p id="setup-error" class="setup-error hidden"></p>
    </div>
  </div>

  <!-- SCREEN 1: BROWSER -->
  <div id="screen-browser" class="screen hidden">
    <header class="browser-header">
      <div class="browser-title"><span id="browser-title-text"></span></div>
      <div class="browser-actions">
        <span id="browser-root-path" class="browser-root-path"></span>
        <button id="btn-change-root" class="btn-sm"></button>
        <button id="btn-toggle-hidden" class="btn-sm btn-toggle-hidden"></button>
        <button id="btn-lang-browser" class="btn-lang-toggle-top"></button>
      </div>
    </header>
    <div id="browser-note" class="browser-note hidden">
      <span id="browser-note-text"></span>
      <button id="browser-note-close" class="browser-note-close" title="✕">✕</button>
    </div>
    <main id="browser-content" class="browser-content">
      <div id="browser-loading" class="loading-state">
        <div class="spinner"></div>
        <p id="browser-loading-text"></p>
      </div>
      <div id="browser-list"></div>
    </main>
  </div>

  <!-- ═══════════ SCREEN 2: EDITOR ═══════════ -->
  <div id="screen-editor" class="screen hidden">
    <header id="toolbar">
      <div class="toolbar-group">
        <button id="btn-back"></button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <button id="btn-add-arrival"></button>
        <button id="btn-add-departure"></button>
        <button id="btn-copy"></button>
        <button id="btn-delete-selected"></button>
        <button id="btn-delete-all"></button>
      </div>
      <div class="toolbar-spacer toolbar-time-wrap">
        <span id="toolbar-time-range"></span>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group save-group">
        <button id="btn-lang-editor" class="btn-lang-toggle-top"></button>
        <button id="btn-backup-only"></button>
        <button id="btn-restore-backup"></button>
        <button id="btn-import-acl"></button>
        <button id="btn-save-as"></button>
        <button id="btn-save" class="btn-primary-sm"></button>
      </div>
    </header>

    <div id="search-bar" class="search-bar hidden">
      <input id="search-input" type="text">
      <span id="search-count" class="search-count"></span>
      <button id="search-prev" class="btn-sm">↑</button>
      <button id="search-next" class="btn-sm">↓</button>
      <button id="search-close" class="search-close">✕</button>
    </div>

    <main id="table-container">
      <div id="tab-flights" class="tab-panel">
        <div id="timeline-block-weather" class="tl-embed-block collapsed">
          <div class="tl-embed-header" data-block="weather">
            <span id="tl-weather-title" class="tl-embed-title"></span>
            <span class="tl-embed-arrow">▸</span>
          </div>
          <div class="tl-embed-body">
            <div class="tl-toolbar tl-embed-toolbar">
              <button id="btn-weather-add" class="btn-sm"></button>
              <span id="weather-range-indicator" class="tl-range-indicator"></span>
              <span id="weather-hidden-count" class="tl-hidden-count"></span>
            </div>
            <div id="weather-list" class="tl-list"></div>
          </div>
        </div>
        <div id="timeline-block-wind" class="tl-embed-block collapsed">
          <div class="tl-embed-header" data-block="wind">
            <span id="tl-wind-title" class="tl-embed-title"></span>
            <span class="tl-embed-arrow">▸</span>
          </div>
          <div class="tl-embed-body">
            <div class="tl-toolbar tl-embed-toolbar">
              <button id="btn-wind-add" class="btn-sm"></button>
              <span id="wind-range-indicator" class="tl-range-indicator"></span>
              <span id="wind-hidden-count" class="tl-hidden-count"></span>
            </div>
            <div id="wind-list" class="tl-list"></div>
          </div>
        </div>
        <div id="timeline-block-runway" class="tl-embed-block collapsed">
          <div class="tl-embed-header" data-block="runway">
            <span id="tl-runway-title" class="tl-embed-title"></span>
            <span class="tl-embed-arrow">▸</span>
          </div>
          <div class="tl-embed-body">
            <div class="tl-toolbar tl-embed-toolbar"></div>
            <div id="runway-editor" class="tl-list"></div>
          </div>
        </div>
        <div id="sections-container">
          <div id="section-arrivals" class="section-block hidden">
            <div class="section-header collapse-header" data-section="arrivals">
              <span id="section-arrivals-title"></span>
              <span class="collapse-arrow">▾</span>
            </div>
            <div class="section-table-wrap">
              <table class="flight-table"><thead><tr></tr></thead><tbody></tbody></table>
            </div>
          </div>
          <div id="section-departures" class="section-block hidden">
            <div class="section-header departure-header collapse-header" data-section="departures">
              <span id="section-departures-title"></span>
              <span class="collapse-arrow">▾</span>
            </div>
            <div class="section-table-wrap">
              <table class="flight-table"><thead><tr></tr></thead><tbody></tbody></table>
            </div>
          </div>
        </div>
        <div id="empty-editor" class="empty-editor hidden">
          <p id="empty-editor-text"></p>
        </div>
      </div>
    </main>

    <footer id="statusbar">
      <span id="editor-filename">—</span>
      <span id="editor-airport" class="editor-airport"></span>
      <span id="flight-stats"></span>
    </footer>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div id="modal-actions"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="renderer/i18n.js"></script>
  <script src="renderer/data-constants.js"></script>
  <script src="renderer/state.js"></script>
  <script src="renderer/ui-utils.js"></script>
  <script src="renderer/setup-screen.js"></script>
  <script src="renderer/browser-screen.js"></script>
  <script src="renderer/editor-core.js"></script>
  <script src="renderer/cell-editor.js"></script>
  <script src="renderer/flight-actions.js"></script>
  <script src="renderer/save-actions.js"></script>
  <script src="renderer/import-actions.js"></script>
  <script src="renderer/timeline-editors.js"></script>
  <script src="renderer/editor-shell.js"></script>
</body>
</html>
