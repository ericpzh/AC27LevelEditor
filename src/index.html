<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>AC27 Level Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════ SCREEN 0: SETUP ═══════════ -->
  <div id="screen-setup" class="screen">
    <div class="setup-card">
      <div class="setup-icon">🛫</div>
      <h1>AC27 Level Editor</h1>
      <p class="setup-sub">请先定位游戏安装目录以扫描所有关卡文件</p>

      <div class="steam-hint">
        <div class="steam-hint-title">💡 如何通过 Steam 找到游戏目录</div>
        <ol>
          <li>打开 Steam 库 → 找到 <strong>Airport Control 25</strong></li>
          <li>右键 → <strong>管理</strong> → <strong>浏览本地文件</strong></li>
          <li>在弹出的文件夹中复制路径，或直接选择</li>
        </ol>
        <p class="steam-path-hint">通常路径如：<code>...\steamapps\common\Airport Control 25 Playtest</code></p>
      </div>

      <button id="btn-select-root" class="btn-big">📂 选择游戏根目录</button>
      <p id="setup-error" class="setup-error hidden"></p>
    </div>
  </div>

  <!-- ═══════════ SCREEN 1: BROWSER ═══════════ -->
  <div id="screen-browser" class="screen hidden">
    <header class="browser-header">
      <div class="browser-title">
        <span class="browser-icon">🛫</span>
        <span>AC27 Level Editor — 关卡列表</span>
      </div>
      <div class="browser-actions">
        <span id="browser-root-path" class="browser-root-path"></span>
        <button id="btn-change-root" class="btn-sm">📁 更换目录</button>
      </div>
    </header>
    <main id="browser-content" class="browser-content">
      <div id="browser-loading" class="loading-state">
        <div class="spinner"></div>
        <p>正在扫描关卡文件…</p>
      </div>
      <div id="browser-list"></div>
    </main>
  </div>

  <!-- ═══════════ SCREEN 2: EDITOR ═══════════ -->
  <div id="screen-editor" class="screen hidden">
    <!-- Toolbar -->
    <header id="toolbar">
      <div class="toolbar-group">
        <button id="btn-back" title="返回关卡列表">← 返回</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <button id="btn-add" title="添加航班 (Ctrl+N)">＋ 添加</button>
        <button id="btn-delete" title="删除选中 (Del)">✕ 删除</button>
        <button id="btn-duplicate" title="复制选中">⧉ 复制</button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <button id="btn-batch-callsign" title="批量生成呼号">🔢 呼号</button>
        <button id="btn-batch-voice" title="批量设置语音">🎤 语音</button>
        <button id="btn-batch-lang" title="批量设置语言">🌐 语言</button>
      </div>
      <div class="toolbar-spacer"></div>
      <div class="toolbar-group">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="搜索…">
        </div>
        <select id="filter-type">
          <option value="all">全部</option>
          <option value="arrival">进港</option>
          <option value="departure">离港</option>
        </select>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group save-group">
        <button id="btn-backup-only" title="手动备份当前文件">💾 备份</button>
        <button id="btn-import-acl" title="导入外部 .acl 覆盖当前">📥 导入</button>
        <button id="btn-save-as" title="另存为…">📋 另存为</button>
        <button id="btn-save" class="btn-primary-sm" title="保存 (Ctrl+S)">💾 保存</button>
      </div>
    </header>

    <!-- Table -->
    <main id="table-container">
      <table id="flight-table">
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="empty-editor" class="empty-editor hidden">
        <p>无匹配的航班记录</p>
      </div>
    </main>

    <!-- Status Bar -->
    <footer id="statusbar">
      <span id="editor-filename">—</span>
      <span class="modified-dot hidden" id="modified-dot">●</span>
      <span id="editor-airport" class="editor-airport"></span>
      <span id="flight-stats"></span>
    </footer>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div id="modal-actions"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
